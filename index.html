<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blooket</title>

<!-- Blooket-style icon -->
<link rel="icon" href="https://play.blooket.com/favicon.ico">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

h1 {
  padding: 15px;
  font-size: 2.5em;
}

.section-title {
  font-size: 1.5em;
  margin-top: 10px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.card {
  width: 320px;
  height: 240px;
  border-radius: 15px;
  overflow: hidden;
  position: relative;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  background: #111;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(0,255,255,0.6);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  pointer-events: none;
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  padding: 10px;
}

button {
  margin: 3px;
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  background: cyan;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: white;
}

.fav-btn {
  background: gold;
}
</style>
</head>

<body>

<h1>🎮 Blooket</h1>

<div class="section-title">⭐ Favorites</div>
<div id="favorites" class="container"></div>

<div class="section-title">🌐 All Sites</div>
<div id="allSites" class="container"></div>

<script>
const sites = [
  "https://my-name-is-anderdingus.b-cdn.net/",
  "https://holy.lervs.ro/",
  "https://bull.yarnowl.com/",
  "https://globaleducation.neocities.org/",
  "https://wmath.pages.dev/#home",
  "https://noterplusfire25.firebaseapp.com/",
  "https://helpdesk.sentinet.co.za/"
];

let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

function saveFavorites() {
  localStorage.setItem("favorites", JSON.stringify(favorites));
}

function toggleFavorite(url) {
  if (favorites.includes(url)) {
    favorites = favorites.filter(f => f !== url);
  } else {
    favorites.push(url);
  }
  saveFavorites();
  render();
}

function openSite(url) {
  const win = window.open();
  win.document.body.style.margin = "0";
  win.document.body.innerHTML = `<iframe src="${url}" style="width:100%;height:100vh;border:none;"></iframe>`;
}

function createCard(url) {
  const card = document.createElement("div");
  card.className = "card";

  const isFav = favorites.includes(url);

  card.innerHTML = `
    <iframe src="${url}"></iframe>
    <div class="overlay">
      ${url}
      <br>
      <button onclick="openSite('${url}')">Open</button>
      <button class="fav-btn" onclick="toggleFavorite('${url}')">
        ${isFav ? "★ Remove" : "☆ Favorite"}
      </button>
    </div>
  `;
  return card;
}

function render() {
  const favContainer = document.getElementById("favorites");
  const allContainer = document.getElementById("allSites");

  favContainer.innerHTML = "";
  allContainer.innerHTML = "";

  favorites.forEach(url => {
    favContainer.appendChild(createCard(url));
  });

  sites.forEach(url => {
    allContainer.appendChild(createCard(url));
  });
}

render();
</script>

</body>
</html>
