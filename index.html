<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Techs</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

h1 {
  padding: 20px;
  font-size: 2.5em;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.card {
  width: 320px;
  height: 240px;
  border-radius: 15px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  background: #111;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(0,255,255,0.6);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  pointer-events: none;
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  font-size: 14px;
}

button {
  margin-top: 5px;
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  background: cyan;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.2s;
}

button:hover {
  background: white;
}
</style>
</head>

<body>

<h1>Learning Techs</h1>

<div class="container">

  <div class="card">
    <iframe src="https://my-name-is-anderdingus.b-cdn.net/"></iframe>
    <div class="overlay">
      Site 1
      <br>
      <button onclick="openSite('https://my-name-is-anderdingus.b-cdn.net/')">Open</button>
    </div>
  </div>

  <div class="card">
    <iframe src="https://holy.lervs.ro/"></iframe>
    <div class="overlay">
      Site 2
      <br>
      <button onclick="openSite('https://holy.lervs.ro/')">Open</button>
    </div>
  </div>

  <div class="card">
    <iframe src="https://bull.yarnowl.com/"></iframe>
    <div class="overlay">
      Site 3
      <br>
      <button onclick="openSite('https://bull.yarnowl.com/')">Open</button>
    </div>
  </div>

</div>

<script>
function openSite(url) {
  const win = window.open();
  win.document.body.style.margin = "0";
  win.document.body.innerHTML = `<iframe src="${url}" style="width:100%;height:100vh;border:none;"></iframe>`;
}
</script>

</body>
</html>
